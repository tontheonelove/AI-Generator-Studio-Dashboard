<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Generation Studio 🚀</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite' }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass-panel { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-left-color: #10b981; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery-img { aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .gallery-img:hover { transform: scale(1.05); border: 2px solid #10b981; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="glass-panel sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 flex justify-between h-16 items-center">
            <div class="flex items-center gap-3">
                <i class="fa-solid fa-rocket text-emerald-500 text-2xl"></i>
                <span class="font-bold text-xl">AI-Generation <span class="gradient-text">Studio</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openGallery()" class="px-3 py-1 rounded-full bg-gray-800 hover:bg-gray-700 text-sm border border-gray-700">
                    <i class="fa-solid fa-images"></i> Gallery
                </button>
                <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-800 border border-gray-700 text-xs text-emerald-400">
                    <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                    <span>Ready</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column -->
        <div class="w-full lg:w-1/3">
            <div class="glass-panel rounded-2xl p-6 shadow-xl">
                <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-sliders text-blue-400"></i> Configuration</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-300 mb-2">AI Model</label>
                        <select id="model-select" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm">
                            <option value="Z-Image Turbo">Z-Image Turbo</option>
                            <option value="Flux 2 Klein">Flux 2 Klein</option>
                        </select>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="block text-sm text-gray-300">Prompt</label>
                            <button onclick="document.getElementById('prompt-input').value=''" class="text-xs text-gray-500 hover:text-red-400">
                                <i class="fa-solid fa-trash-can"></i> Clear
                            </button>
                        </div>
                        <textarea id="prompt-input" rows="4" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm" placeholder="Describe..."></textarea>
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs text-gray-500">✨ Quick Presets</label>
                            <button onclick="randomPrompt()" class="text-xs text-emerald-400 hover:text-emerald-300">
                                <i class="fa-solid fa-dice"></i> Surprise Me
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-2">
                            <button onclick="addPrompt('cinematic lighting, 8k, masterpiece')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-emerald-600 border border-gray-600">Cinematic</button>
                            <button onclick="addPrompt('photorealistic, 8k, raw photo')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-blue-600 border border-gray-600">Realistic</button>
                            <button onclick="addPrompt('anime style, vivid colors')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-purple-600 border border-gray-600">Anime</button>
                            <button onclick="addPrompt('3d render, unreal engine 5')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-orange-600 border border-gray-600">3D</button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="addPrompt('cyberpunk, neon lights')" class="px-2 py-1 text-[10px] rounded-full bg-gray-800 hover:bg-gray-600 border border-gray-700">Cyberpunk</button>
                            <button onclick="addPrompt('dark fantasy, gothic')" class="px-2 py-1 text-[10px] rounded-full bg-gray-800 hover:bg-gray-600 border border-gray-700">Dark Fantasy</button>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-gray-700 space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">Width</label>
                                <select id="width-select" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm">
                                    <option value="720">720</option>
                                    <option value="1024" selected>1024</option>
                                    <option value="1280">1280</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs text-gray-400 mb-1">Height</label>
                                <select id="height-select" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-sm">
                                    <option value="720">720</option>
                                    <option value="1024" selected>1024</option>
                                    <option value="1280">1280</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-gray-400 mb-1">Seed (-1 for Random)</label>
                            <input type="number" id="seed-input" value="-1" class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm">
                        </div>
                    </div>
                </div>

                <button id="generate-btn" onclick="generate()" class="mt-6 w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 rounded-xl shadow-lg flex justify-center items-center gap-2">
                    <span>✨ Generate Masterpiece</span>
                </button>
            </div>
        </div>

        <!-- Right Column -->
        <div class="w-full lg:w-2/3">
            <div class="glass-panel rounded-2xl p-1 min-h-[500px] flex flex-col relative overflow-hidden">
                <div id="display-area" class="flex-grow flex items-center justify-center bg-gray-900/50 rounded-xl m-1 relative">
                    
                    <div id="placeholder" class="text-center p-8">
                        <div class="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-slow">
                            <i class="fa-solid fa-wand-magic-sparkles text-3xl text-gray-600"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-400">Ready to Create</h3>
                    </div>

                    <div id="loading" class="hidden absolute inset-0 bg-gray-900/90 z-20 flex flex-col items-center justify-center">
                        <div class="loader mb-4" style="width: 48px; height: 48px;"></div>
                        <h3 class="text-lg font-semibold text-white">Generating...</h3>
                        <p class="text-sm text-gray-400 mt-2">Please wait</p>
                    </div>

                    <img id="result-image" class="hidden max-w-full max-h-[600px] object-contain rounded-lg shadow-2xl" src="">
                </div>

                <div id="action-bar" class="hidden p-4 border-t border-gray-700 flex justify-between items-center">
                    <div class="text-sm text-gray-400">
                        Seed: <span id="result-seed" class="font-mono text-emerald-400">-</span>
                    </div>
                    <a id="download-link" href="#" download="ai-image.png" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> Download
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Gallery Modal -->
    <div id="galleryModal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col border border-gray-700">
            <div class="flex justify-between items-center p-4 border-b border-gray-800">
                <h2 class="text-lg font-bold">🖼️ Gallery</h2>
                <button onclick="closeGallery()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow">
                <div id="galleryList" class="gallery-grid"></div>
            </div>
        </div>
    </div>

    <footer class="border-t border-gray-800 py-6">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>Powered by FastAPI, ComfyUI | Made by ❤️ TonLikeIT</p>
        </div>
    </footer>

    <script>
        let audioCtx = null;

        // Sound
        function playSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) { console.warn('Sound skipped'); }
        }

        // Prompt helpers
        function addPrompt(text) {
            const input = document.getElementById('prompt-input');
            input.value = input.value.trim() ? input.value + ", " + text : text;
            input.focus();
        }

        function randomPrompt() {
            const prompts = [
                "futuristic city floating in clouds, cyberpunk, neon lights, 8k",
                "cute cat wearing spacesuit on Mars, realistic, cinematic",
                "samurai in cherry blossom forest, Japanese art style, 8k",
                "underwater crystal palace, bioluminescent fish, 8k",
                "cozy coffee shop in rainy forest, warm lighting",
                "mechanical dragon breathing fire, steampunk, 8k"
            ];
            document.getElementById('prompt-input').value = prompts[Math.floor(Math.random() * prompts.length)];
        }

        // Check queue status (polling every 2s)
        async function checkStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const btn = document.getElementById('generate-btn');
                if (data.is_processing && !btn.classList.contains('busy')) {
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Processing...';
                    btn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
                    btn.classList.remove('from-emerald-500', 'to-teal-600');
                } else if (!data.is_processing && !btn.classList.contains('busy')) {
                    btn.disabled = false;
                    btn.innerHTML = '<span>✨ Generate Masterpiece</span>';
                    btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
                    btn.classList.add('from-emerald-500', 'to-teal-600');
                }
            } catch (e) {}
        }
        setInterval(checkStatus, 2000);

        // Main generate function
        async function generate() {
            const prompt = document.getElementById('prompt-input').value;
            if (!prompt) { alert("Please enter a prompt!"); return; }

            const btn = document.getElementById('generate-btn');
            const loading = document.getElementById('loading');
            const placeholder = document.getElementById('placeholder');
            const resultImg = document.getElementById('result-image');
            const actionBar = document.getElementById('action-bar');

            // Init audio on first user interaction
            if (!audioCtx) {
                try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
            }

            // Check status
            const statusRes = await fetch('/api/status');
            const statusData = await statusRes.json();
            if (statusData.is_processing) {
                alert("⚠️ System busy, please wait...");
                return;
            }

            // Set loading
            btn.classList.add('busy');
            btn.disabled = true;
            btn.innerHTML = '<div class="loader mr-2"></div> Processing...';
            placeholder.classList.add('hidden');
            resultImg.classList.add('hidden');
            actionBar.classList.add('hidden');
            loading.classList.remove('hidden');

            const payload = {
                prompt: prompt,
                model: document.getElementById('model-select').value,
                seed: parseInt(document.getElementById('seed-input').value),
                width: parseInt(document.getElementById('width-select').value),
                height: parseInt(document.getElementById('height-select').value)
            };

            try {
                const res = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Generation failed');
                }

                const data = await res.json();

                // Show result
                resultImg.src = data.base64;
                resultImg.classList.remove('hidden');
                document.getElementById('result-seed').innerText = data.seed;
                document.getElementById('download-link').href = data.base64;
                document.getElementById('download-link').download = `ai-image-${data.seed}.png`;
                actionBar.classList.remove('hidden');

                playSound();

            } catch (e) {
                alert("Error: " + e.message);
                placeholder.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
                btn.classList.remove('busy');
                btn.disabled = false;
                btn.innerHTML = '<span>✨ Generate Masterpiece</span>';
                btn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
                btn.classList.add('from-emerald-500', 'to-teal-600');
            }
        }

        // Gallery
        async function openGallery() {
            document.getElementById('galleryModal').classList.remove('hidden');
            const list = document.getElementById('galleryList');
            list.innerHTML = "<p class='text-gray-500'>Loading...</p>";
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                list.innerHTML = "";
                if (data.length === 0) {
                    list.innerHTML = "<p class='text-gray-500 col-span-full text-center'>No history yet.</p>";
                    return;
                }
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "relative group";
                    div.innerHTML = `
                        <img src="/api/outputs/${item.filename}" class="gallery-img w-full" onclick="loadFromGallery('${item.prompt.replace(/'/g, "\\'")}', ${item.seed}, '${item.model}')">
                        <div class="absolute bottom-0 left-0 right-0 bg-black/70 p-1 text-[10px] truncate opacity-0 group-hover:opacity-100">${item.prompt}</div>
                    `;
                    list.appendChild(div);
                });
            } catch (e) {
                list.innerHTML = "<p class='text-red-400'>Load failed</p>";
            }
        }

        function closeGallery() {
            document.getElementById('galleryModal').classList.add('hidden');
        }

        function loadFromGallery(prompt, seed, model) {
            document.getElementById('prompt-input').value = prompt;
            document.getElementById('seed-input').value = seed;
            document.getElementById('model-select').value = model;
            closeGallery();
        }
    </script>
</body>
</html>
