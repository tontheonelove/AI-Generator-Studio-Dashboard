<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Generation Studio 🚀</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#10b981',
                        accent: '#3b82f6'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0f172a; color: white; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(to right, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        
        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Gallery Grid */
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery-img { aspect-ratio: 1; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
        .gallery-img:hover { transform: scale(1.05); border: 2px solid #10b981; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-50 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-rocket text-emerald-500 text-2xl"></i>
                    <span class="font-bold text-xl tracking-tight">AI-Generation <span class="gradient-text">Studio</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="openGallery()" class="px-3 py-1 rounded-full bg-gray-800 hover:bg-gray-700 text-sm transition flex items-center gap-2 border border-gray-700">
                        <i class="fa-solid fa-images"></i> Gallery
                    </button>
                    <div class="flex items-center gap-2 px-3 py-1 rounded-full bg-gray-800 border border-gray-700 text-xs font-medium text-emerald-400">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]"></div>
                        <span>Local GPU Ready</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        
        <!-- Left Column: Controls -->
        <div class="w-full lg:w-1/3 space-y-6">
            <div class="glass-panel rounded-2xl p-6 shadow-xl">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-sliders text-blue-400"></i> Configuration
                </h2>

                <!-- Model -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-2">AI Model</label>
                        <select id="model-select" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                            <option value="Z-Image Turbo">Z-Image Turbo</option>
                            <option value="Flux 2 Klein">Flux 2 Klein</option>
                        </select>
                    </div>

                    <!-- Prompt Area -->
                    <div>
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-sm font-medium text-gray-300">Prompt</label>
                            <button onclick="clearPrompt()" class="text-xs text-gray-500 hover:text-red-400 transition">
                                <i class="fa-solid fa-trash-can"></i> Clear
                            </button>
                        </div>
                        <textarea id="prompt-input" rows="4" 
                            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 outline-none resize-none"
                            placeholder="Describe your imagination..."></textarea>
                    </div>

                    <!-- ✨ Prompt Presets -->
                    <div class="pt-2">
                        <div class="flex justify-between items-center mb-2">
                            <label class="block text-xs text-gray-500">✨ Quick Presets</label>
                            <button onclick="randomPrompt()" class="text-xs text-emerald-400 hover:text-emerald-300 flex items-center gap-1">
                                <i class="fa-solid fa-dice"></i> Surprise Me
                            </button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2 mb-3">
                            <button onclick="addPrompt('cinematic lighting, 8k, masterpiece, highly detailed')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-emerald-600 text-gray-300 hover:text-white transition border border-gray-600">Cinematic</button>
                            <button onclick="addPrompt('photorealistic, 8k, raw photo, dslr, 50mm lens')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-blue-600 text-gray-300 hover:text-white transition border border-gray-600">Realistic</button>
                            <button onclick="addPrompt('anime style, vivid colors, studio ghibli, vibrant')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-purple-600 text-gray-300 hover:text-white transition border border-gray-600">Anime</button>
                            <button onclick="addPrompt('3d render, unreal engine 5, octane render, 8k')" class="px-2 py-1 text-[10px] rounded-full bg-gray-700 hover:bg-orange-600 text-gray-300 hover:text-white transition border border-gray-600">3D</button>
                        </div>
                        
                        <div class="flex flex-wrap gap-2">
                            <button onclick="addPrompt('bokeh, depth of field, soft focus')" class="px-2 py-1 text-[10px] rounded-full bg-gray-800 hover:bg-gray-600 text-gray-400 hover:text-white transition border border-gray-700">Bokeh</button>
                            <button onclick="addPrompt('cyberpunk, neon lights, futuristic city')" class="px-2 py-1 text-[10px] rounded-full bg-gray-800 hover:bg-gray-600 text-gray-400 hover:text-white transition border border-gray-700">Cyberpunk</button>
                            <button onclick="addPrompt('dark fantasy, gothic, intricate details')" class="px-2 py-1 text-[10px] rounded-full bg-gray-800 hover:bg-gray-600 text-gray-400 hover:text-white transition border border-gray-700">Dark Fantasy</button>
                        </div>
                    </div>

                    <!-- Advanced Settings -->
                    <div class="pt-4 border-t border-gray-700">
                        <button id="advanced-toggle" class="text-xs text-gray-400 hover:text-white flex items-center gap-1 mb-3 w-full justify-center">
                            <i class="fa-solid fa-chevron-down"></i> Advanced Settings
                        </button>
                        <div id="advanced-options" class="hidden space-y-3">
                            <textarea id="neg_prompt" rows="2" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs" placeholder="Negative Prompt (Optional)"></textarea>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="number" id="cfg" value="7" step="0.5" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs" placeholder="CFG Scale">
                                <input type="number" id="steps" value="20" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs" placeholder="Steps">
                            </div>
                            <select id="sampler" class="w-full bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs">
                                <option value="euler">Euler</option>
                                <option value="euler_ancestral">Euler a</option>
                                <option value="dpmpp_2m">DPM++ 2M</option>
                                <option value="dpmpp_sde">DPM++ SDE</option>
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <select id="width-select" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs">
                                    <option value="720">720</option>
                                    <option value="1024" selected>1024</option>
                                    <option value="1280">1280</option>
                                </select>
                                <select id="height-select" class="bg-gray-800 border border-gray-700 rounded px-2 py-1.5 text-xs">
                                    <option value="720">720</option>
                                    <option value="1024" selected>1024</option>
                                    <option value="1280">1280</option>
                                </select>
                            </div>
                            <input type="number" id="seed-input" value="-1" 
                                class="w-full bg-gray-800 border border-gray-700 rounded px-3 py-1.5 text-sm" placeholder="Seed (-1 for Random)">
                        </div>
                    </div>
                </div>

                <!-- Generate Button -->
                <button id="generate-btn" class="mt-6 w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/20 transform transition hover:-translate-y-0.5 active:translate-y-0 flex justify-center items-center gap-2">
                    <span>✨ Generate Masterpiece</span>
                </button>
            </div>
        </div>

        <!-- Right Column: Display -->
        <div class="w-full lg:w-2/3">
            <div class="glass-panel rounded-2xl p-1 min-h-[500px] flex flex-col relative overflow-hidden">
                <div class="absolute top-4 left-4 z-10 flex gap-2">
                    <span class="px-3 py-1 rounded-full bg-black/50 backdrop-blur text-xs font-mono text-gray-300 border border-white/10">
                        Output Preview
                    </span>
                </div>

                <div id="display-area" class="flex-grow flex items-center justify-center bg-gray-900/50 rounded-xl m-1 relative">
                    
                    <!-- Placeholder -->
                    <div id="placeholder-state" class="text-center p-8">
                        <div class="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mx-auto mb-4 animate-pulse-slow">
                            <i class="fa-solid fa-wand-magic-sparkles text-3xl text-gray-600"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-400">Ready to Create</h3>
                        <p class="text-gray-500 text-sm mt-2">Select a preset or enter a prompt</p>
                    </div>

                    <!-- Loading -->
                    <div id="loading-state" class="hidden absolute inset-0 bg-gray-900/90 backdrop-blur-sm z-20 flex flex-col items-center justify-center">
                        <div class="relative w-24 h-24 mb-6">
                            <div class="absolute inset-0 border-4 border-gray-700 rounded-full"></div>
                            <div class="absolute inset-0 border-4 border-emerald-500 rounded-full border-t-transparent animate-spin"></div>
                            <div class="absolute inset-0 flex items-center justify-center font-bold text-emerald-400" id="progress-percent">0%</div>
                        </div>
                        <h3 class="text-lg font-semibold text-white mb-1" id="loading-text">Initializing...</h3>
                        <p class="text-sm text-gray-400 font-mono" id="loading-node">Connecting to Local GPU</p>
                    </div>

                    <!-- Result -->
                    <img id="result-image" class="hidden max-w-full max-h-[600px] object-contain rounded-lg shadow-2xl" src="" alt="Generated Image">
                </div>

                <!-- Action Bar -->
                <div id="action-bar" class="hidden p-4 border-t border-gray-700 flex justify-between items-center bg-gray-800/50">
                    <div class="text-sm text-gray-400">
                        Seed: <span id="result-seed" class="font-mono text-emerald-400">-</span>
                    </div>
                    <a id="download-link" href="#" download="z-image-pro.png" 
                       class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition flex items-center gap-2">
                        <i class="fa-solid fa-download"></i> Download
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Gallery Modal -->
    <div id="galleryModal" class="fixed inset-0 bg-black/80 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-gray-900 rounded-2xl w-full max-w-4xl max-h-[90vh] flex flex-col border border-gray-700">
            <div class="flex justify-between items-center p-4 border-b border-gray-800">
                <h2 class="text-lg font-bold">🖼️ Generation History</h2>
                <button onclick="closeGallery()" class="text-gray-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-grow">
                <div id="galleryList" class="gallery-grid"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-6 mt-auto">
        <div class="container mx-auto px-4 text-center text-gray-500 text-sm">
            <p>Powered by FastAPI, ComfyUI | Made by ❤️ TonLikeIT</p>
        </div>
    </footer>

    <!-- JavaScript Logic -->
    <script>
        const API_URL = "";
        let audioCtx = null;

        // ---  Sound & Notification Helpers ---
        function playNotificationSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.3);
                
                gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } catch (e) { console.warn('Sound skipped:', e); }
        }

        async function sendBrowserNotification(title, body) {
            if (!("Notification" in window)) return;
            if (Notification.permission === "granted") {
                new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/3081/3081559.png" });
            } else if (Notification.permission !== "denied") {
                const perm = await Notification.requestPermission();
                if (perm === "granted") new Notification(title, { body });
            }
        }

        // --- ✨ Prompt Helper Functions ---
        function addPrompt(text) {
            const input = document.getElementById('prompt-input');
            const current = input.value.trim();
            input.value = current.length > 0 ? current + ", " + text : text;
            input.focus();
            input.classList.add('ring-2', 'ring-emerald-500');
            setTimeout(() => input.classList.remove('ring-2', 'ring-emerald-500'), 300);
        }

        function clearPrompt() {
            document.getElementById('prompt-input').value = "";
        }

        function randomPrompt() {
            const prompts = [
                "A futuristic city floating in the clouds, cyberpunk style, neon lights, 8k, highly detailed",
                "A cute cat wearing a spacesuit on Mars, realistic texture, cinematic lighting",
                "Portrait of a samurai in a cherry blossom forest, traditional Japanese art style, 8k",
                "An underwater palace made of crystal, bioluminescent fish, 8k, unreal engine 5",
                "A cozy coffee shop in a rainy forest, warm lighting, lo-fi aesthetic",
                "Mechanical dragon breathing fire, steampunk style, intricate gears, 8k"
            ];
            document.getElementById('prompt-input').value = prompts[Math.floor(Math.random() * prompts.length)];
        }

        // --- DOM Elements ---
        const advancedToggle = document.getElementById('advanced-toggle');
        const advancedOptions = document.getElementById('advanced-options');
        const generateBtn = document.getElementById('generate-btn');
        const placeholderState = document.getElementById('placeholder-state');
        const loadingState = document.getElementById('loading-state');
        const resultImage = document.getElementById('result-image');
        const actionBar = document.getElementById('action-bar');
        const loadingNode = document.getElementById('loading-node');
        const progressPercent = document.getElementById('progress-percent');
        const resultSeed = document.getElementById('result-seed');
        const downloadLink = document.getElementById('download-link');

        // Check Status
        async function checkSystemStatus() {
            try {
                const res = await fetch(`${API_URL}/api/status`);
                const data = await res.json();
                if (data.is_processing) {
                    generateBtn.disabled = true;
                    generateBtn.innerHTML = `<i class="fa-solid fa-hourglass-half"></i> Processing...`;
                    generateBtn.classList.add('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
                    generateBtn.classList.remove('from-emerald-500', 'to-teal-600');
                } else if (!generateBtn.classList.contains('processing')) {
                    generateBtn.disabled = false;
                    generateBtn.innerHTML = `<span>✨ Generate Masterpiece</span>`;
                    generateBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-600');
                    generateBtn.classList.add('from-emerald-500', 'to-teal-600');
                }
            } catch (e) { console.error('Status check failed:', e); }
        }
        checkSystemStatus();
        setInterval(checkSystemStatus, 2000);

        // Toggle Advanced
        advancedToggle.addEventListener('click', () => {
            advancedOptions.classList.toggle('hidden');
            const icon = advancedToggle.querySelector('i');
            icon.classList.toggle('fa-chevron-down');
            icon.classList.toggle('fa-chevron-up');
        });

        // --- 🚀 MAIN GENERATE FUNCTION (STREAMING FIXED) ---
        async function startGen() {
            const btn = generateBtn;
            const placeholder = placeholderState;
            const loading = loadingState;
            const result = resultImage;
            const prog = progressPercent;
            const node = loadingNode;

            // เก็บค่าจากฟอร์ม
            const payload = {
                prompt: document.getElementById('prompt-input').value,
                negative_prompt: document.getElementById('neg_prompt').value || "",
                model: document.getElementById('model-select').value,
                seed: parseInt(document.getElementById('seed-input').value),
                width: parseInt(document.getElementById('width-select').value),
                height: parseInt(document.getElementById('height-select').value),
                cfg_scale: parseFloat(document.getElementById('cfg').value || 7.0),
                steps: parseInt(document.getElementById('steps').value || 20),
                sampler: document.getElementById('sampler').value || "euler"
            };

            if(!payload.prompt) { alert("Please enter a prompt!"); return; }

            // ขอ Permission ตอนกดปุ่มครั้งแรก
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (Notification.permission === "default") Notification.requestPermission();

            const statusRes = await fetch(`${API_URL}/api/status`);
            const statusData = await statusRes.json();
            if (statusData.is_processing) {
                alert("⚠️ System is busy. Please wait...");
                return;
            }

            // Set Loading State
            placeholder.classList.add('hidden');
            result.classList.add('hidden');
            actionBar.classList.add('hidden');
            loading.classList.remove('hidden');
            btn.classList.add('processing');
            btn.disabled = true;
            btn.innerHTML = `<div class="loader mr-2"></div> Processing...`;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            prog.innerText = "0%";
            node.innerText = "Connecting...";

            try {
                // เรียก API แบบ Streaming
                const res = await fetch(`${API_URL}/api/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error("Server Error: " + res.status);

                // อ่านข้อมูลแบบ Stream (ทีละชิ้น)
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buffer = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // ถอดรหัสข้อมูลและตัดแบ่งบรรทัด
                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split("\n");
                    buffer = lines.pop(); // เก็บบรรทัดสุดท้ายที่ยังไม่ครบไว้

                    for (const line of lines) {
                        // ✅ เช็คว่าขึ้นต้นด้วย "data: "
                        if (line.startsWith("data: ")) {
                            try {
                                const jsonStr = line.slice(6).trim(); // ตัด "data: " ออก
                                if (!jsonStr) continue; 
                                
                                const evt = JSON.parse(jsonStr); // Parse JSON ที่สะอาดแล้ว

                                // จัดการเหตุการณ์
                                if (evt.type === "progress") {
                                    const pct = Math.floor((evt.value / evt.max) * 100);
                                    prog.innerText = pct + "%";
                                    if (evt.node) node.innerText = evt.node;
                                } 
                                else if (evt.type === "status") {
                                    if (evt.node) node.innerText = "Running: " + evt.node;
                                } 
                                else if (evt.type === "complete") {
                                    // งานเสร็จ!
                                    clearInterval(window.progressInterval); // หยุดจำลองถ้ามี
                                    prog.innerText = "100%";
                                    
                                    result.src = evt.url;
                                    result.classList.remove('hidden');
                                    playNotificationSound(); 
                                    sendBrowserNotification("✅ Gen Complete!", "Your masterpiece is ready.");
                                    
                                    resultSeed.innerText = evt.seed;
                                    downloadLink.href = evt.url;
                                    downloadLink.download = `z-image-${evt.seed}.png`;
                                    actionBar.classList.remove('hidden');

                                    // Reset UI
                                    loading.classList.add('hidden');
                                    btn.classList.remove('processing');
                                    btn.disabled = false;
                                    btn.innerHTML = `<span>✨ Generate Masterpiece</span>`;
                                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                                    checkSystemStatus();
                                    return; 
                                } 
                                else if (evt.type === "error") {
                                    throw new Error(evt.detail);
                                }
                            } catch (e) {
                                console.warn("Parse error:", e, "Line:", line);
                            }
                        }
                    }
                }
            } catch (e) {
                console.error(e);
                alert("Error: " + e.message);
                loading.classList.add('hidden');
                placeholder.classList.remove('hidden');
                btn.classList.remove('processing');
                btn.disabled = false;
                btn.innerHTML = `<span>✨ Generate Masterpiece</span>`;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                checkSystemStatus();
            }
        }

        // Bind Event
        generateBtn.addEventListener('click', startGen);

        // --- ️ Gallery Logic ---
        async function openGallery() {
            document.getElementById('galleryModal').classList.remove('hidden');
            const list = document.getElementById('galleryList');
            list.innerHTML = "<p class='text-gray-500'>Loading history...</p>";
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                list.innerHTML = "";
                if(data.length === 0) {
                    list.innerHTML = "<p class='text-gray-500 col-span-full text-center'>No history yet.</p>";
                    return;
                }
                data.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "relative group";
                    div.innerHTML = `
                        <img src="/api/outputs/${item.filename}" class="gallery-img w-full" onclick="viewDetail('${item.prompt.replace(/'/g, "\\'")}', '${item.seed}', '${item.model}')">
                        <div class="absolute bottom-0 left-0 right-0 bg-black/70 p-1 text-[10px] truncate opacity-0 group-hover:opacity-100 transition">
                            ${item.prompt}
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch(e) { list.innerHTML = "<p class='text-red-400'>Load failed</p>"; }
        }
        function closeGallery() { document.getElementById('galleryModal').classList.add('hidden'); }
        function viewDetail(p, s, m) {
            document.getElementById('prompt-input').value = p;
            document.getElementById('seed-input').value = s;
